    <h1>JavaScript Conditional Statements</h1>
    <!--comment-->

    <input type="text" id="Age" class="form-control" placeholder="Type here..."></iput>

    <button class="btn btn-info" onclick="checkAge()">Check</button>

    <script>
        function checkAge(){
            var age = document.getElementById("Age").value;
            
            if(isNaN(age) || age < 0) {
                alert("Please input a valid number")
            }

            else if(age < 18){
                alert("You are underage!")
            }

            else if(age > 18){
                alert("You are old!")
            }

            else{
                alert("Please indicate your age.")
            }
        }
    </script>
